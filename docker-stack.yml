services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: visor
      POSTGRES_PASSWORD: tUD6Jm3y374y
      POSTGRES_DB: visor_predicciones
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  app:
    image: ghcr.io/aguero-pen/visor_predicciones:latest
    environment:
      DATABASE_URL: postgresql://visor:tUD6Jm3y374y@db:5432/visor_predicciones
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "8001:8000"
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    configs:
      - source: cf_config
        target: /etc/cloudflared/config.yml
    secrets:
      - source: cf_credentials
        target: /etc/cloudflared/credentials.json
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s

volumes:
  pgdata:

configs:
  cf_config:
    external: true

secrets:
  cf_credentials:
    external: true
