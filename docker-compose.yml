services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: visor
      POSTGRES_PASSWORD: visor_pass_2026
      POSTGRES_DB: visor_predicciones
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visor -d visor_predicciones"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    env_file: .env
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
