name: Build y Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extraer version del release
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build y push imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/aguero-pen/visor_predicciones:${{ steps.version.outputs.tag }}
            ghcr.io/aguero-pen/visor_predicciones:latest

      - name: Deploy en Azure Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            docker service update \
              --with-registry-auth \
              --image ghcr.io/aguero-pen/visor_predicciones:${{ steps.version.outputs.tag }} \
              visor_app
